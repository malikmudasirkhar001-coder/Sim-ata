<!DOCTYPE html>
<html>
<head>
    <title>Mobile API Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #out { margin-top: 20px; padding: 10px; background: #e9ecef; border-radius: 4px; word-break: break-all; min-height: 40px; }
    </style>
</head>
<body>

<div class="box">
    <h3>Data Tracker (Mobile Fix)</h3>
    <input type="number" id="num" placeholder="03017544623">
    <button onclick="testApi()">Check Data Now</button>
    <div id="out">Status: Waiting for input...</div>
</div>

<script>
    async function testApi() {
        const number = document.getElementById('num').value;
        const output = document.getElementById('out');

        if(!number) return alert("Number likhein!");

        output.innerText = "🔄 Connecting to Proxy...";
        output.style.color = "blue";

        // Hum doosri proxy use kar rahe hain (corsproxy.io)
        const targetUrl = `https://simsownersdetails.pk/sd-lookup.php?number=${number}`;
        const finalUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(finalUrl);
            
            if (!response.ok) throw new Error("Network response was not ok");

            const text = await response.text();
            
            // Check karein ke response JSON hai ya nahi
            try {
                const data = JSON.parse(text);
                output.innerText = JSON.stringify(data, null, 2);
                output.style.color = "green";
            } catch (e) {
                // Agar JSON nahi hai toh raw text dikhayein
                output.innerText = "Received Data (Not JSON):\n" + text;
                output.style.color = "orange";
            }

        } catch (e) {
            output.innerText = "❌ Connection Failed: " + e.message + "\n\nTip: VPN on karke check karein.";
            output.style.color = "red";
        }
    }
</script>

</body>
</html>
